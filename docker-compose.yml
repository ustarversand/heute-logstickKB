version: '3'

services:
  dashboard:
    build: .
    image: ustar-heute-dashboard:latest
    container_name: ustar-heute-dashboard
    restart: unless-stopped
    ports:
      - "8890:8890"
    environment:
      - DASHBOARD_PORT=8890
      - HEUTE_USERNAME=${HEUTE_USERNAME:-USTAR}
      - HEUTE_PASSWORD=${HEUTE_PASSWORD}
      - MSCJ_USERNAME=${MSCJ_USERNAME:-MSCJ}
      - MSCJ_PASSWORD=${MSCJ_PASSWORD}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      # Python 源码 bind mount — 修改立即生效，无需 rebuild
      - ./heute_db.py:/app/heute_db.py
      - ./heute_api.py:/app/heute_api.py
      - ./heute_sdk.py:/app/heute_sdk.py
      - ./heute_express_sync.py:/app/heute_express_sync.py
      - ./heute_cli.py:/app/heute_cli.py
      - ./heute_track_api.py:/app/heute_track_api.py
      - ./batch_track_hybrid.py:/app/batch_track_hybrid.py
      - ./scan_anomalies.py:/app/scan_anomalies.py
      - ./dashboard/app.py:/app/dashboard/app.py
      - ./dashboard/templates/index.html:/app/dashboard/templates/index.html
